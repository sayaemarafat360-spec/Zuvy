# Codemagic CI/CD Configuration for Ludo Blitz
# This file configures the build process for building the app on Codemagic cloud

workflows:
  android-app:
    name: Ludo Blitz
    max_build_duration: 30
    environment:
      android: stable
      java: 17
      groups:
        - firebase_credentials  # Add Firebase service account credentials
        - keystore_credentials  # Add signing keystore credentials
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Set up local properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      
      - name: Clean project
        script: |
          ./gradlew clean
      
      - name: Run lint
        script: |
          ./gradlew lintDebug
        ignore_failure: true
      
      - name: Run unit tests
        script: |
          ./gradlew testDebugUnitTest
      
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug
      
      - name: Build Release APK
        script: |
          ./gradlew assembleRelease
    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
      
      # Firebase App Distribution (optional)
      firebase:
        firebase_service_credentials: $FIREBASE_SERVICE_ACCOUNT_CREDENTIALS
        android:
          app_id: your-firebase-app-id
          groups:
            - testers
          release_notes: "New build from Codemagic CI/CD"

  # Workflow for debug builds only
  debug-build:
    name: Debug Build
    max_build_duration: 15
    environment:
      android: stable
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: feature/*
          include: true
    scripts:
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
